[phases.setup]
aptPkgs = [
  "libnss3", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1",
  "libxrandr2", "libgbm1", "libpango-1.0-0", "libcairo2",
  "libasound2", "libxshmfence1", "libglib2.0-0", "libx11-xcb1",
  "libxcb1", "libxext6", "libx11-6", "libxcb-dri3-0",
  "libxfixes3", "libdbus-1-3", "libexpat1"
]

[phases.install]
cmds = ["npm install", "npx playwright install --with-deps"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
